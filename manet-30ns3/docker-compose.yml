version: '3.8'

# ---------------------------------------------------------------------------
# MANET ns-3 Controller + Node image build composition
#
# `controller` is the long-running service (NS-3.47 + cppyy): it hosts
# the FastAPI control plane, the ns-3 Python simulator, and the orchestrator
# that spawns/destroys `manet-node` containers at runtime via the Docker socket.
#
# `node-image-builder` is a one-shot build target whose only purpose is to
# produce the `manet-node:latest` image used by the controller at runtime.
# It does not run as a service.
#
# Bring up:
#   docker compose build node-image-builder controller
#   docker compose up -d controller
#   curl localhost:8000/api/health
#   curl -XPOST localhost:8000/api/sim/start \
#        -H 'content-type: application/json' \
#        -d '{"preset":"debug"}'
# ---------------------------------------------------------------------------

services:
  controller:
    # 本地开发时取消注释 build 段，注释 image 行
    # build:
    #   context: .
    #   dockerfile: controller/Dockerfile.controller
    image: ghcr.io/clawdbuddy/manet-controller:latest
    container_name: controller
    privileged: true
    network_mode: host
    pid: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      - LOG_LEVEL=INFO
      - MANET_WEB_DIR=/app/dist
    volumes:
      # Speak Docker to spawn node containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist netns symlinks across IPRoute/NetNS calls
      - /var/run/netns:/var/run/netns
      # Mount controller source code for live reload (dev workflow)
      # 生产环境使用 GitHub Actions 镜像时注释掉这行，镜像内部已打包 controller
      - ./controller:/app/controller
      # Optional: surface pcap/ascii traces and FlowMonitor XML to the host
      - ./results:/results
      # Persist user simulation configuration across container restarts
      - ./config:/app/config
    restart: unless-stopped

  # Build-only target. The controller spawns these containers at runtime via
  # the Docker socket; we never start this service directly.
  node-image-builder:
    profiles: ["build"]
    build:
      context: ./node
      dockerfile: Dockerfile.node
    image: manet-node:latest
    command: ["/bin/true"]
    restart: "no"
