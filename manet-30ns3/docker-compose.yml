version: '3.8'

# ---------------------------------------------------------------------------
# MANET ns-3 Controller + Node image build composition
#
# `ns3-controller` is the long-running service (NS-3.47 + cppyy): it hosts
# the FastAPI control plane, the ns-3 Python simulator, and the orchestrator
# that spawns/destroys `manet-node` containers at runtime via the Docker socket.
#
# `node-image-builder` is a one-shot build target whose only purpose is to
# produce the `manet-node:latest` image used by the controller at runtime.
# It does not run as a service.
#
# Bring up:
#   docker compose build node-image-builder ns3-controller
#   docker compose up -d ns3-controller
#   curl localhost:8000/api/health
#   curl -XPOST localhost:8000/api/sim/start \
#        -H 'content-type: application/json' \
#        -d '{"preset":"debug"}'
# ---------------------------------------------------------------------------

services:
  ns3-controller:
    build:
      context: .
      dockerfile: ns3-controller/Dockerfile.controller
    image: ns3-controller:3.47
    container_name: ns3-controller
    privileged: true
    network_mode: host
    pid: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      - LOG_LEVEL=INFO
      - MANET_WEB_DIR=/app/dist
    volumes:
      # Speak Docker to spawn node containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist netns symlinks across IPRoute/NetNS calls
      - /var/run/netns:/var/run/netns
      # Optional: surface pcap/ascii traces and FlowMonitor XML to the host
      - ./results:/results
      # Persist user simulation configuration across container restarts
      - ./config:/app/config
    restart: unless-stopped

  # NS-3.47 备用构建（cppyy 绑定，使用 Dockerfile.controller.347）。
  # 默认 `docker compose up` 不拉取，必须用 profile 启用：
  #   docker compose --profile v347 build ns3-controller-347
  #   docker compose --profile v347 up   -d ns3-controller-347
  # 与 ns3-controller 共享 br-ns3 / tap / veth 这一套全局网络资源，
  # 同一时刻只能让一个 controller 跑仿真，否则会互踩。
  ns3-controller-347:
    profiles: ["v347"]
    build:
      context: .
      dockerfile: ns3-controller/Dockerfile.controller.347
    image: ns3-controller:3.47
    container_name: ns3-controller-347
    privileged: true
    network_mode: host
    pid: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      - LOG_LEVEL=INFO
      - MANET_WEB_DIR=/app/dist
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/netns:/var/run/netns
      - ./results:/results
      - ./config:/app/config
    # 8000 已被 ns3-controller 占用；这里换 8001 以便并行起服。
    command: ["uvicorn", "controller.api.main:app",
              "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped

  # Build-only target. The controller spawns these containers at runtime via
  # the Docker socket; we never start this service directly.
  node-image-builder:
    profiles: ["build"]
    build:
      context: ./node
      dockerfile: Dockerfile.node
    image: manet-node:latest
    command: ["/bin/true"]
    restart: "no"
