// ================================================================
// NS-3 AdHoc 30-Node Simulation Configuration File
// ================================================================
// Usage: sudo ./ns3 run "scratch/manet-30nodes --configFile=config.conf"
//
// Format: key = value   (one per line, // for comments)
// All keys are optional; omitted keys use built-in defaults.
//
// Override via CommandLine: --key=value takes precedence over config file.

// --- General ---
nNodes = 30
simulationTime = 300
seed = 1
run = 1

// --- PHY: 802.11 ---
// Standards: 80211b, 80211a, 80211g, 80211n-2.4GHz, 80211n-5GHz, 80211ac, 80211ax-2.4GHz, 80211ax-5GHz
standard = 80211g
dataRate = ErpOfdmRate54Mbps
txPowerStart = 20.0
txPowerEnd = 20.0
txPowerLevels = 1
rxSensitivity = -85.0
ccaThreshold = -62.0
antennaGain = 0.0

// --- Propagation Models ---
// Propagation delay: ConstantSpeed, Random
propagationDelay = ConstantSpeed

// Path loss: LogDistance, FreeSpace, TwoRayGround, ThreeLogDistance, Cost231, Range
pathLossModel = LogDistance
pathLossExponent = 3.0
pathLossRefLoss = 46.6777
pathLossRefDistance = 1.0

// Fading: enable/disable + model selection
enableFading = true
fadingModel = Nakagami

// Nakagami parameters (m controls fading severity)
// m < 1: severe fading, m = 1: Rayleigh, m > 2: light fading
nakagamiM0 = 1.5
nakagamiM1 = 1.0
nakagamiM2 = 0.5
nakagamiD1 = 50.0
nakagamiD2 = 100.0

// --- MAC: AdHoc ---
ssid = adhoc-30ns3
bssid = 00:00:00:00:AD:H0

// Rate control: Arf, Aarf, Onoe, Constant, Minstrel
rateControl = Arf

// RTS/CTS threshold: 0=always use, 65535=never use (disable)
rtsCtsThreshold = 2200
fragmentationThreshold = 2200
nonUnicastMode = false

// Contention window
// cwMin = 15
// cwMax = 1023

// Beacon interval (TU, 1 TU = 1024 us)
beaconInterval = 100

// --- Routing ---
// Protocols: aodv, olsr, dsdv, dsr, none
routingProtocol = aodv

// AODV parameters
aodvHelloInterval = 1.0
aodvRreqRetries = 2
aodvActiveRouteTimeout = 3.0
aodvDeletePeriod = 5.0
aodvNetDiameter = 35
aodvEnableHello = true

// OLSR parameters
olsrHelloInterval = 2.0
olsrTcInterval = 5.0
olsrWillingness = 7

// DSDV parameters
dsdvPeriodicUpdateInterval = 15.0
dsdvSettlingTime = 6

// --- Mobility ---
// Models: random-walk, gauss-markov, grid, constant
mobilityModel = random-walk

// Area dimensions (meters)
mobilityMinX = 0.0
mobilityMaxX = 500.0
mobilityMinY = 0.0
mobilityMaxY = 500.0

// RandomWalk parameters
rwMinSpeed = 0.5
rwMaxSpeed = 3.0
rwDistance = 20.0
rwMode = Time
rwTime = 1.0

// Grid parameters (used if mobilityModel = grid)
gridMinX = 10.0
gridMinY = 10.0
gridDeltaX = 80.0
gridDeltaY = 80.0
gridWidth = 6
gridLayout = RowFirst

// Gauss-Markov parameters
gmAlpha = 0.85

// --- Tracing ---
pcap = true
ascii = false
flowMonitor = true
pcapPrefix = manet-30nodes-adhoc
enableMobilityTrace = false

// --- TapBridge ---
tapMode = UseBridge
tapPrefix = tap-
