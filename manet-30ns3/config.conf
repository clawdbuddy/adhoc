// ================================================================
// NS-3 802.11s Mesh / AdHoc 30-Node Simulation Configuration File
// ================================================================
// 等价于 PRESETS["default"]：802.11s mesh + SpectrumWifiPhy + Friis @ 590 MHz UHF
// + 30 节点 + 5 km × 5 km 活动区 + 4 km LOS 视距预算 + AODV。
//
// Format: key = value   (one per line, // for comments)
// All keys are optional; omitted keys use built-in defaults from
// controller/orchestrator/config.py:SimConfig.
//
// 优先级（高 → 低）：REST overrides > 此 .conf 文件 > preset > 内置默认。

// --- General ---
nNodes = 16
simulationTime = 300
seed = 1
run = 1

// --- PHY: 802.11a + SpectrumWifiPhy + 590 MHz UHF ---
standard = 80211a
phyModel = spectrum
frequencyMhz = 590
channelWidthMhz = 20
rangeTargetM = 4000.0
dataRate = OfdmRate6Mbps
txPowerStart = 30.0
txPowerEnd = 30.0
txPowerLevels = 1
rxSensitivity = -92.0
ccaThreshold = -82.0
antennaGain = 3.0

// --- Propagation Models ---
propagationDelay = ConstantSpeed
pathLossModel = FreeSpace
pathLossExponent = 2.0
pathLossRefLoss = 46.6777
pathLossRefDistance = 1.0
enableFading = false
fadingModel = Nakagami
nakagamiM0 = 1.5
nakagamiM1 = 1.0
nakagamiM2 = 0.75
nakagamiD1 = 50.0
nakagamiD2 = 100.0

// --- MAC: 802.11s mesh (HWMP) ---
macMode = mesh
ssid = adhoc-30ns3
bssid = 00:00:00:00:AD:H0
rateControl = Constant
rtsCtsThreshold = 2200
fragmentationThreshold = 2200
nonUnicastMode = false
beaconInterval = 100
cwMin = 15
cwMax = 1023

// --- Routing: AODV ---
routingProtocol = aodv
aodvHelloInterval = 1.0
aodvRreqRetries = 2
aodvActiveRouteTimeout = 3.0
aodvDeletePeriod = 5.0
aodvNetDiameter = 35
aodvEnableHello = true
olsrHelloInterval = 2.0
olsrTcInterval = 5.0
olsrWillingness = 7
dsdvPeriodicUpdateInterval = 15.0
dsdvSettlingTime = 6

// --- Mobility: 5 km × 5 km RandomWalk ---
mobilityModel = random-walk
mobilityMinX = 0.0
mobilityMaxX = 5000.0
mobilityMinY = 0.0
mobilityMaxY = 5000.0
rwMinSpeed = 0.5
rwMaxSpeed = 3.0
rwDistance = 200.0
rwMode = Time
rwTime = 1.0
gridMinX = 100.0
gridMinY = 100.0
gridDeltaX = 800.0
gridDeltaY = 800.0
gridWidth = 6
gridLayout = RowFirst
gmAlpha = 0.85

// --- Tracing ---
pcap = true
ascii = false
flowMonitor = true
pcapPrefix = manet-30nodes-adhoc
enableMobilityTrace = false

// --- TapBridge ---
tapMode = UseBridge
tapPrefix = tap-
