// ================================================================
// Urban Environment Configuration
// High path loss, heavy fading, short ranges, RTS/CTS enabled
// ================================================================

nNodes = 30
simulationTime = 300

// 802.11g in 2.4GHz urban
standard = 80211g
dataRate = ErpOfdmRate24Mbps
txPowerStart = 18.0
txPowerEnd = 18.0
rxSensitivity = -82.0
ccaThreshold = -60.0

// Heavy urban propagation
propagationDelay = ConstantSpeed
pathLossModel = LogDistance
pathLossExponent = 4.0              // Dense urban
pathLossRefLoss = 46.6777
pathLossRefDistance = 1.0

// Severe multipath fading
enableFading = true
fadingModel = Nakagami
nakagamiM0 = 1.0                    // Rayleigh-like
nakagamiM1 = 0.75
nakagamiM2 = 0.5
nakagamiD1 = 30.0
nakagamiD2 = 60.0

// MAC: conservative settings
rateControl = Aarf
rtsCtsThreshold = 500               // Always use RTS/CTS
fragmentationThreshold = 1000       // Small fragments

// AODV for on-demand routing
routingProtocol = aodv
aodvHelloInterval = 0.5             // Fast neighbor detection
aodvActiveRouteTimeout = 2.0
aodvNetDiameter = 20

// Random walk in 300x300m dense area
mobilityModel = random-walk
mobilityMinX = 0.0
mobilityMaxX = 300.0
mobilityMinY = 0.0
mobilityMaxY = 300.0
rwMinSpeed = 0.5
rwMaxSpeed = 2.0

pcap = true
pcapPrefix = manet-urban
