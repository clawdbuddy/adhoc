// ================================================================
// Urban Environment Configuration
// ================================================================
// 等价于 PRESETS["urban"]：802.11s mesh + 城区 LogDistance n=3.5 +
// 强 Nakagami 衰落 + Aarf + 始终 RTS/CTS + 2 km × 2 km 活动区。
// 频段保持 590 MHz UHF（与 default 一致），但路径衰减更陡。

nNodes = 30
simulationTime = 300

// --- PHY: 城区功率回退、灵敏度收紧 ---
standard = 80211a
phyModel = spectrum
frequencyMhz = 590
channelWidthMhz = 20
rangeTargetM = 4000.0
dataRate = OfdmRate6Mbps
txPowerStart = 27.0
txPowerEnd = 27.0
rxSensitivity = -90.0
ccaThreshold = -78.0
antennaGain = 3.0

// --- Propagation: LogDistance n=3.5 + 强 Nakagami ---
propagationDelay = ConstantSpeed
pathLossModel = LogDistance
pathLossExponent = 3.5
pathLossRefLoss = 46.6777
pathLossRefDistance = 1.0
enableFading = true
fadingModel = Nakagami
nakagamiM0 = 1.0
nakagamiM1 = 0.75
nakagamiM2 = 0.5
nakagamiD1 = 300.0
nakagamiD2 = 800.0

// --- MAC: 802.11s mesh + 保守 Aarf + 始终 RTS/CTS + 短分片 ---
macMode = mesh
ssid = adhoc-urban
rateControl = Aarf
rtsCtsThreshold = 500
fragmentationThreshold = 1000

// --- Routing: AODV（沿用 default）---
routingProtocol = aodv

// --- Mobility: 2 km × 2 km RandomWalk，慢速 ---
mobilityModel = random-walk
mobilityMinX = 0.0
mobilityMaxX = 2000.0
mobilityMinY = 0.0
mobilityMaxY = 2000.0
rwMinSpeed = 0.5
rwMaxSpeed = 2.0
rwDistance = 100.0
gridDeltaX = 300.0
gridDeltaY = 300.0

pcap = true
pcapPrefix = manet-urban
