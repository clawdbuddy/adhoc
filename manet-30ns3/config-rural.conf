// ================================================================
// Rural / Open Field Configuration
// ================================================================
// 等价于 PRESETS["rural"]：802.11s mesh + FreeSpace + 8 km × 8 km grid
// + 关闭 RTS/CTS（无隐藏终端）。功率与灵敏度按"高功率长距"调整。

nNodes = 16
simulationTime = 300

// --- PHY: 高功率 / 高灵敏度 ---
standard = 80211a
phyModel = spectrum
frequencyMhz = 590
channelWidthMhz = 20
rangeTargetM = 4000.0
dataRate = OfdmRate6Mbps
txPowerStart = 33.0
txPowerEnd = 33.0
rxSensitivity = -95.0
ccaThreshold = -85.0
antennaGain = 3.0

// --- Propagation: 自由空间，无衰落 ---
propagationDelay = ConstantSpeed
pathLossModel = FreeSpace
pathLossExponent = 2.0
enableFading = false

// --- MAC: 802.11s mesh，关闭 RTS/CTS ---
macMode = mesh
ssid = adhoc-rural
rateControl = Constant
rtsCtsThreshold = 65535
fragmentationThreshold = 2200

// --- Routing: AODV（沿用 default）---
routingProtocol = aodv

// --- Mobility: 8 km × 8 km Grid ---
mobilityModel = grid
mobilityMinX = 0.0
mobilityMaxX = 8000.0
mobilityMinY = 0.0
mobilityMaxY = 8000.0
gridMinX = 200.0
gridMinY = 200.0
gridDeltaX = 1500.0
gridDeltaY = 1500.0
gridWidth = 6

pcap = true
pcapPrefix = manet-rural
