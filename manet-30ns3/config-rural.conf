// ================================================================
// Rural / Open Field Configuration
// Low path loss, light fading, long ranges, high throughput
// ================================================================

nNodes = 30
simulationTime = 300

// 802.11a in 5GHz (cleaner spectrum)
standard = 80211a
dataRate = OfdmRate54Mbps
txPowerStart = 23.0                 // Higher power for long range
txPowerEnd = 23.0
rxSensitivity = -90.0               // More sensitive
ccaThreshold = -65.0

// Free space + light fading
propagationDelay = ConstantSpeed
pathLossModel = TwoRayGround        // Open field ground reflection
pathLossExponent = 2.0

// Light fading
enableFading = true
fadingModel = Nakagami
nakagamiM0 = 3.0                    // Light fading (close to Rician)
nakagamiM1 = 2.0
nakagamiM2 = 1.5
nakagamiD1 = 100.0
nakagamiD2 = 200.0

// MAC: high throughput
rateControl = Arf
rtsCtsThreshold = 65535             // Disable RTS/CTS (no hidden terminals)
fragmentationThreshold = 2200

// OLSR for stable proactive routing
routingProtocol = olsr
olsrHelloInterval = 5.0             // Stable topology, less frequent
olsrTcInterval = 10.0

// Grid layout in 1000x1000m
mobilityModel = grid
mobilityMinX = 0.0
mobilityMaxX = 1000.0
mobilityMinY = 0.0
mobilityMaxY = 1000.0
gridDeltaX = 150.0
gridDeltaY = 150.0
gridWidth = 6

pcap = true
pcapPrefix = manet-rural
