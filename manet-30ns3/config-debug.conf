// ================================================================
// Debug Configuration
// Minimal setup for quick testing
// ================================================================

nNodes = 5
simulationTime = 60
seed = 1

standard = 80211g
dataRate = ErpOfdmRate54Mbps
txPowerStart = 20.0
txPowerEnd = 20.0

// Simple propagation
pathLossModel = LogDistance
pathLossExponent = 2.0
enableFading = false

// Fixed grid
mobilityModel = grid
gridMinX = 10.0
gridMinY = 10.0
gridDeltaX = 50.0
gridDeltaY = 50.0
gridWidth = 5

// No routing (pure L2)
routingProtocol = none

// Full tracing
pcap = true
ascii = true
flowMonitor = true
enableMobilityTrace = true
pcapPrefix = manet-debug

// Logging
logComponents = Manet30Nodes
