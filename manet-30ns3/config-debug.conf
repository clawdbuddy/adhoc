// ================================================================
// Debug Configuration — 5-node smoke test
// ================================================================
// 等价于 PRESETS["debug"]：adhoc 模式（非 mesh）+ routing=none +
// 5 节点 / 60 秒 / 50 m 网格 / 200 m 视距 / 关闭衰落 / ASCII trace 全开。

nNodes = 5
simulationTime = 60
seed = 1

// --- PHY: 仍走 SpectrumWifiPhy + 590 MHz UHF, 但只关心短距 ---
standard = 80211a
phyModel = spectrum
frequencyMhz = 590
channelWidthMhz = 20
rangeTargetM = 200.0
dataRate = OfdmRate6Mbps
txPowerStart = 30.0
txPowerEnd = 30.0
rxSensitivity = -92.0
ccaThreshold = -82.0
antennaGain = 3.0

// --- Propagation: 自由空间 + 关闭衰落 ---
pathLossModel = FreeSpace
pathLossExponent = 2.0
enableFading = false

// --- MAC: 退回 ad-hoc IBSS（最简化路径）---
macMode = adhoc
ssid = adhoc-debug

// --- Routing: 关闭，纯 L2 桥接 ---
routingProtocol = none

// --- Mobility: 5×5 网格，50 m 间距 ---
mobilityModel = grid
mobilityMinX = 0.0
mobilityMaxX = 300.0
mobilityMinY = 0.0
mobilityMaxY = 300.0
gridMinX = 10.0
gridMinY = 10.0
gridDeltaX = 50.0
gridDeltaY = 50.0
gridWidth = 5

// --- Tracing: 全开（含 ASCII 与移动 trace）---
pcap = true
ascii = true
flowMonitor = true
enableMobilityTrace = true
pcapPrefix = manet-debug
