name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. 构建并发布 manet-node 镜像（Ubuntu 20.04 + iproute2 + iperf3 + sshd）
  # ---------------------------------------------------------------------------
  node-image:
    name: Build manet-node 镜像
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 计算镜像 tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/adhoc-node
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build & push
        uses: docker/build-push-action@v5
        with:
          context: manet-30ns3/node
          file: manet-30ns3/node/Dockerfile.node
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=node-image
          cache-to: type=gha,mode=max,scope=node-image

  # ---------------------------------------------------------------------------
  # 2. 把 React Web 管理面板与 ns3-controller 镜像打包到一起：
  #    同一 job 内先 vite build 出 dist/，再喂给 Dockerfile.controller。
  #    Dockerfile.controller 的 `COPY web-manager/dist /app/dist` 把 UI 静态包
  #    烤进 ns3-controller 镜像，FastAPI 在 :8000 端口直接托管。
  # ---------------------------------------------------------------------------
  controller-image:
    name: Build ns3-controller 镜像（含 Web 管理面板）
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # ---- 2a. 在 manet-30ns3/web-manager/ 内编译 React 面板 → 同目录 dist/ ----
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: manet-30ns3/web-manager/package-lock.json

      - name: npm ci
        working-directory: manet-30ns3/web-manager
        run: npm ci --no-audit --no-fund

      - name: lint（非阻塞）
        working-directory: manet-30ns3/web-manager
        run: npm run lint || echo "::warning::ESLint 未通过，但不阻塞 build"

      - name: vite build
        working-directory: manet-30ns3/web-manager
        run: npm run build

      # ---- 2b. Docker 构建并推送 ----
      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 计算镜像 tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/adhoc-controller
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build & push
        uses: docker/build-push-action@v5
        with:
          context: manet-30ns3
          file: manet-30ns3/ns3-controller/Dockerfile.controller
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=controller-image
          cache-to: type=gha,mode=max,scope=controller-image
