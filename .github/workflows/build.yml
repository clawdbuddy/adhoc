name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. 编译 React 前端，并把 dist 作为 artifact 上传，供后续步骤使用
  # ---------------------------------------------------------------------------
  webapp:
    name: Build React Web 管理面板
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: npm ci
        working-directory: app
        run: npm ci --no-audit --no-fund

      - name: lint（非阻塞）
        working-directory: app
        run: npm run lint || echo "::warning::ESLint 未通过，但不阻塞 build"

      - name: vite build
        working-directory: app
        run: npm run build

      - name: 上传 dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: app/dist
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 2. 构建并发布 manet-node 镜像（Ubuntu 20.04 + iproute2 + iperf3 + sshd）
  # ---------------------------------------------------------------------------
  node-image:
    name: Build manet-node 镜像
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 计算镜像 tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/adhoc-node
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build & push
        uses: docker/build-push-action@v5
        with:
          context: manet-30ns3/node
          file: manet-30ns3/node/Dockerfile.node
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=node-image
          cache-to: type=gha,mode=max,scope=node-image

  # ---------------------------------------------------------------------------
  # 3. 构建并发布 ns3-controller 镜像（NS-3.45 + Python bindings + FastAPI）
  #    依赖 webapp 任务的 dist artifact，先放到 manet-30ns3/web-manager/。
  # ---------------------------------------------------------------------------
  controller-image:
    name: Build ns3-controller 镜像
    runs-on: ubuntu-latest
    needs: webapp
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: 下载 dist artifact 到 web-manager/
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: manet-30ns3/web-manager

      - name: 列出最终 web-manager/ 内容
        run: ls -la manet-30ns3/web-manager/

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 计算镜像 tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/adhoc-controller
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build & push
        uses: docker/build-push-action@v5
        with:
          context: manet-30ns3
          file: manet-30ns3/ns3-controller/Dockerfile.controller
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=controller-image
          cache-to: type=gha,mode=max,scope=controller-image
