name: Build and Push MANET Images

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. 前端静态检查 + 构建
  # ---------------------------------------------------------------------------
  frontend:
    name: Build Web Manager
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: manet-30ns3/web-manager/package-lock.json

      - name: npm ci
        working-directory: manet-30ns3/web-manager
        run: npm ci --no-audit --no-fund

      - name: lint
        working-directory: manet-30ns3/web-manager
        run: npm run lint || echo "::warning::ESLint 未通过，但不阻塞 build"

      - name: vite build
        working-directory: manet-30ns3/web-manager
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-manager-dist
          path: manet-30ns3/web-manager/dist
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 2. manet-node 镜像
  # ---------------------------------------------------------------------------
  node-image:
    name: Build manet-node
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/manet-node
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push manet-node
        uses: docker/build-push-action@v5
        with:
          context: manet-30ns3/node
          file: manet-30ns3/node/Dockerfile.node
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=node-image
          cache-to: type=gha,mode=max,scope=node-image

  # ---------------------------------------------------------------------------
  # 3. controller 多版本矩阵构建（3.36 pybindgen / 3.47 cppyy）
  # ---------------------------------------------------------------------------
  controller-image:
    name: Build controller (${{ matrix.ns3_version }})
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - ns3_version: "3.47"
            dockerfile: controller/Dockerfile.controller.347
            image_name: manet-controller
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-manager-dist
          path: manet-30ns3/web-manager/dist

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=ns${{ matrix.ns3_version }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push controller:${{ matrix.ns3_version }}
        uses: docker/build-push-action@v5
        with:
          context: manet-30ns3
          file: manet-30ns3/${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=controller-${{ matrix.ns3_version }}
          cache-to: type=gha,mode=max,scope=controller-${{ matrix.ns3_version }}
          build-args: |
            NS3_VERSION=${{ matrix.ns3_version }}
            NS3_JOBS=4

  # ---------------------------------------------------------------------------
  # 4. Release Notes（仅在打 tag 时生成）
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [node-image, controller-image]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          echo "## MANET Controller Release ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Docker Images" >> RELEASE_NOTES.md
          echo "| 组件 | 镜像 | NS-3 版本 | 绑定后端 |" >> RELEASE_NOTES.md
          echo "|------|------|-----------|----------|" >> RELEASE_NOTES.md
          echo "| 节点 | \`ghcr.io/${{ github.repository_owner }}/manet-node:${{ github.ref_name }}\` | — | — |" >> RELEASE_NOTES.md
          echo "| 控制器 | \`ghcr.io/${{ github.repository_owner }}/manet-controller:${{ github.ref_name }}\` | 3.47 | cppyy |" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Changelog" >> RELEASE_NOTES.md
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:'- %s' "$PREV_TAG"..HEAD >> RELEASE_NOTES.md
          else
            git log --pretty=format:'- %s' -20 >> RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
